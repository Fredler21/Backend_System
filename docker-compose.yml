version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: edlight-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: edlight_user
      POSTGRES_PASSWORD: edlight_pass
      POSTGRES_DB: edlight_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edlight_user -d edlight_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Application ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: edlight-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://edlight_user:edlight_pass@db:5432/edlight_db
      JWT_SECRET: change-this-in-production-minimum-16-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-this-refresh-secret-min-16-chars
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 12
      CORS_ORIGIN: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
